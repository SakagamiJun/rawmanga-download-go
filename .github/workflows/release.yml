name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: klz9-downloader
  PNPM_VERSION: 10.33.2
  WAILS_VERSION: v2.12.0

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-24.04
            platform: linux/amd64
            archive: klz9-downloader-linux-amd64.tar.gz
            wails_args: "-tags webkit2_41"
          - name: macos-universal
            os: macos-latest
            platform: darwin/universal
            archive: klz9-downloader-macos-universal.zip
            wails_args: ""
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
            archive: klz9-downloader-windows-amd64.zip
            wails_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Add Windows C compiler to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build application
        if: runner.os != 'macOS'
        run: wails build -clean -platform ${{ matrix.platform }} ${{ matrix.wails_args }}

      - name: Build application
        if: runner.os == 'macOS'
        env:
          CGO_LDFLAGS: "-framework UniformTypeIdentifiers -mmacosx-version-min=10.13"
        run: wails build -clean -platform ${{ matrix.platform }} ${{ matrix.wails_args }}

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -C build/bin -czf dist/${{ matrix.archive }} ${{ env.APP_NAME }}

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/bin/${{ env.APP_NAME }}.app dist/${{ matrix.archive }}

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Compress-Archive -Path "build/bin/${{ env.APP_NAME }}.exe" -DestinationPath "dist/${{ matrix.archive }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --title "$TAG_NAME" --generate-notes
          fi
